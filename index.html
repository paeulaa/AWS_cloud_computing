<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS CCP CLF-C02 Quiz</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="css/fonts.css">
<link rel="stylesheet" href="css/styles.css?v=3">
</head>
<body>
<h1>AWS CCP CLF-C02<br>719 Practice Questions</h1>

<div class="stats">
    <div class="stats-row">
        <div class="stat">
            <span class="stat-label">Total</span>
            <span class="stat-value">719</span>
        </div>
        <div class="stat">
            <span class="stat-label">Correct</span>
            <span class="stat-value" id="correct">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Wrong</span>
            <span class="stat-value stat-value-muted" id="wrong">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Left</span>
            <span class="stat-value stat-value-faint" id="unanswered">719</span>
        </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="controls">
    <input type="number" class="jump-input" id="jumpTo" min="1" max="719" placeholder="#number">
    <button class="btn jump-btn" onclick="jumpToQ()">Jump to Question</button>
    <button class="btn btn-reset-all" onclick="resetAll()">Reset All</button>
</div>

<div id="questions"></div>

<button type="button" class="back-to-top" id="backToTop" onclick="scrollToTop()" aria-label="Back to top" title="Back to top">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 19V5M5 12l7-7 7 7"/>
    </svg>
</button>

<script src="js/questions.js"></script>
<script src="js/app.js"></script>
</body>
</html>
