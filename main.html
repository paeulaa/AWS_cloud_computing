<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS CCP CLF-C02 Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<h1>AWS CCP CLF-C02<br>719 Practice Questions</h1>

<div class="stats">
    <div class="stats-row">
        <div class="stat">
            <span class="stat-label">Total</span>
            <span class="stat-value">719</span>
        </div>
        <div class="stat">
            <span class="stat-label">Correct</span>
            <span class="stat-value" id="correct">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Wrong</span>
            <span class="stat-value stat-value-muted" id="wrong">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Left</span>
            <span class="stat-value stat-value-faint" id="unanswered">719</span>
        </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="controls">
    <input type="number" class="jump-input" id="jumpTo" min="1" max="719" placeholder="#number">
    <button class="btn jump-btn" onclick="jumpToQ()">Jump to Question</button>
    <button class="btn btn-reset-all" onclick="resetAll()">Reset All</button>
</div>

<div id="questions"></div>

<script src="js/questions.js"></script>
<script src="js/app.js"></script>
</body>
</html>
